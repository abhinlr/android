workflows:
  android-debug:
    name: Spot Matrix Android Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
